<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>COSMOS v3 · CODE7 ARCADE</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#020210;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; font-family:'Courier New',monospace;
  overflow:hidden; touch-action:none; user-select:none;
}
#hud {
  display:flex; justify-content:space-between; align-items:center;
  width:100%; max-width:480px; padding:5px 12px;
  background:rgba(10,10,40,0.97); border:1px solid #1a1a6e; border-bottom:none;
  color:#a8d8f0; font-size:11px; letter-spacing:1px; gap:6px;
}
.hv { color:#ffd166; }
.hcombo { color:#ff6b9d; min-width:70px; text-align:center; font-size:11px; }
#volRow {
  display:flex; align-items:center; gap:6px;
  width:100%; max-width:480px; padding:3px 12px;
  background:rgba(10,10,40,0.97); border:1px solid #1a1a6e; border-top:none; border-bottom:none;
  color:#3a5a7a; font-size:9px; letter-spacing:1px;
}
#volRow input[type=range] {
  -webkit-appearance:none; height:3px; background:#1a3a5a; border-radius:2px; flex:1; cursor:pointer;
}
#volRow input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:10px; height:10px; border-radius:50%; background:#4fc3f7; cursor:pointer;
}
#muteBtn {
  background:none; border:1px solid #1a3a5a; color:#3a5a7a; font-size:9px;
  padding:2px 6px; cursor:pointer; font-family:inherit; letter-spacing:1px;
  transition:all 0.15s;
}
#muteBtn:hover, #muteBtn.active { border-color:#4fc3f7; color:#4fc3f7; }
canvas { display:block; max-width:100vw; border:1px solid #1a1a6e; }
#footer { color:#1a2a4a; font-size:9px; margin-top:6px; letter-spacing:2px; }
</style>
</head>
<body>
<div id="hud">
  <span>STG <span class="hv" id="stageEl">1</span></span>
  <span>HP <span class="hv" id="hpEl">♥♥♥</span></span>
  <span class="hcombo" id="comboEl"></span>
  <span>SCORE <span class="hv" id="scoreEl">0</span></span>
  <span>BEST <span class="hv" id="bestEl">0</span></span>
</div>
<div id="volRow">
  <span>VOL</span>
  <input type="range" id="volSlider" min="0" max="100" value="60">
  <button id="muteBtn">🔊</button>
</div>
<canvas id="c" width="480" height="620"></canvas>
<div id="footer">COSMOS v3.0 · CODE7 ARCADE</div>

<script>
// ══════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════
const AC = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = AC.createGain();
masterGain.gain.value = 0.6;
masterGain.connect(AC.destination);
let muted = false, volumeVal = 0.6;

document.getElementById('volSlider').addEventListener('input', e => {
  volumeVal = e.target.value / 100;
  if (!muted) masterGain.gain.value = volumeVal;
});
document.getElementById('muteBtn').addEventListener('click', () => {
  muted = !muted;
  masterGain.gain.value = muted ? 0 : volumeVal;
  const btn = document.getElementById('muteBtn');
  btn.textContent = muted ? '🔇' : '🔊';
  btn.classList.toggle('active', muted);
});

function resumeAudio() { if (AC.state === 'suspended') AC.resume(); }

function playTone(freq, type, duration, gainVal, freqEnd) {
  try {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(masterGain);
    const t = AC.currentTime;
    o.type = type; o.frequency.setValueAtTime(freq, t);
    if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, t + duration);
    g.gain.setValueAtTime(gainVal, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + duration);
    o.start(t); o.stop(t + duration);
  } catch(e) {}
}

const SFX = {
  shoot:    () => playTone(880, 'square', 0.07, 0.1, 440),
  hit:      () => playTone(300, 'sawtooth', 0.14, 0.18, 80),
  combo:    () => { playTone(523,'sine',0.08,0.12); setTimeout(()=>playTone(659,'sine',0.08,0.12),60); setTimeout(()=>playTone(784,'sine',0.1,0.14),120); },
  damage:   () => playTone(110, 'sawtooth', 0.35, 0.28, 40),
  shield:   () => playTone(200, 'sine', 0.18, 0.14, 600),
  skill:    () => { playTone(440,'sawtooth',0.06,0.2); setTimeout(()=>playTone(880,'sawtooth',0.12,0.25),60); setTimeout(()=>playTone(1320,'square',0.2,0.3),130); },
  bossHit:  () => playTone(180, 'sawtooth', 0.2, 0.25, 90),
  bossRoar: () => { playTone(80,'sawtooth',0.4,0.35,40); setTimeout(()=>playTone(60,'sawtooth',0.3,0.3,30),200); },
  stageUp:  () => { [523,659,784,1046].forEach((f,i) => setTimeout(()=>playTone(f,'sine',0.15,0.18),i*80)); },
  gameover: () => { playTone(220,'sawtooth',0.5,0.3,55); setTimeout(()=>playTone(110,'sawtooth',0.6,0.25,40),300); },
  pickup:   () => playTone(660, 'sine', 0.15, 0.15, 1320),
};

// ══════════════════════════════════════════
//  CANVAS / CONSTANTS
// ══════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 620;

function resize() {
  const s = Math.min(window.innerWidth, 480) / W;
  canvas.style.width=(W*s)+'px'; canvas.style.height=(H*s)+'px';
  document.getElementById('hud').style.width=(W*s)+'px';
  document.getElementById('volRow').style.width=(W*s)+'px';
}
resize(); window.addEventListener('resize', resize);

// ══════════════════════════════════════════
//  STARS
// ══════════════════════════════════════════
const STARS = Array.from({length:110}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  size: Math.random()*2+0.3,
  opacity: Math.random()*0.7+0.2,
  speed: Math.random()*0.6+0.15,
}));

// ══════════════════════════════════════════
//  GAME VARS
// ══════════════════════════════════════════
let state = 'idle'; // idle | playing | stageClear | dead
let score=0, highScore=0, hp=3, maxHp=5;
let shield=0, maxShield=3, shieldRegen=0;
let combo=0, lastKillTime=0;
let stage=1, stageKills=0, stageKillTarget=20;
let stageClearTimer=0;
let gameTime=0;
let screenShake=0;
let keys={}, isTouching=false, lastTime=0;
let player, bullets, enemyBullets, enemies, boss;
let explosions=[], floatTexts=[];
let lastFire=0, lastEnemySpawn=0, lastEnemyFire=0;
// Skills
let skillCharge=0, skillMax=100, skillActive=false, skillTimer=0;
let skillType=0; // 0=spread, 1=laser, 2=bomb
// Drops
let drops=[];

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
function initGame() {
  player = { x:W/2, y:H-70 };
  bullets=[]; enemyBullets=[]; enemies=[]; drops=[];
  explosions=[]; floatTexts=[];
  boss=null;
  score=0; hp=3; maxHp=5; shield=2; maxShield=3; shieldRegen=0;
  combo=0; lastKillTime=0;
  stage=1; stageKills=0; stageKillTarget=getKillTarget(1);
  gameTime=0; screenShake=0;
  lastFire=0; lastEnemySpawn=0; lastEnemyFire=0;
  skillCharge=0; skillActive=false; skillTimer=0; skillType=0;
  updateHUD();
}

function getKillTarget(s) { return 15 + s * 8; }

function updateHUD() {
  document.getElementById('scoreEl').textContent = score;
  document.getElementById('bestEl').textContent = highScore;
  document.getElementById('stageEl').textContent = stage;
  document.getElementById('hpEl').textContent = '♥'.repeat(Math.max(0,hp)) + '♡'.repeat(Math.max(0,maxHp-hp));
  const ce = document.getElementById('comboEl');
  if (combo >= 2) { ce.textContent = combo+'x COMBO'; ce.style.color = combo>=5?'#ffd166':'#ff6b9d'; }
  else ce.textContent = '';
}

// ══════════════════════════════════════════
//  DRAW HELPERS
// ══════════════════════════════════════════
function drawPlayer(x, y) {
  ctx.save();
  // Engine
  if (skillActive) {
    const eg = ctx.createRadialGradient(x,y+22,0,x,y+22,18);
    eg.addColorStop(0,'rgba(100,255,200,1)'); eg.addColorStop(1,'transparent');
    ctx.fillStyle=eg; ctx.beginPath(); ctx.ellipse(x,y+22,14,7,0,0,Math.PI*2); ctx.fill();
  }
  const eg2 = ctx.createRadialGradient(x,y+20,0,x,y+20,10);
  eg2.addColorStop(0,'rgba(255,209,102,0.9)'); eg2.addColorStop(1,'transparent');
  ctx.fillStyle=eg2; ctx.beginPath(); ctx.ellipse(x,y+20,9,5,0,0,Math.PI*2); ctx.fill();

  const col = skillActive ? '#80ffcc' : '#a8d8f0';
  const col2 = skillActive ? '#40ffaa' : '#7ec8e3';
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.moveTo(x,y-22); ctx.lineTo(x+12,y+16); ctx.lineTo(x,y+10); ctx.closePath(); ctx.fill();
  ctx.fillStyle=col2;
  ctx.beginPath(); ctx.moveTo(x,y-22); ctx.lineTo(x-12,y+16); ctx.lineTo(x,y+10); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#5ba3c9';
  ctx.beginPath(); ctx.moveTo(x-12,y+16); ctx.lineTo(x-20,y+24); ctx.lineTo(x-6,y+14); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+12,y+16); ctx.lineTo(x+20,y+24); ctx.lineTo(x+6,y+14); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#1a1a4e';
  ctx.beginPath(); ctx.ellipse(x,y-6,5,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(79,195,247,0.6)';
  ctx.beginPath(); ctx.ellipse(x,y-7,3,5,0,0,Math.PI*2); ctx.fill();
  // Shield ring
  if (shield > 0) {
    const r = shield/maxShield;
    const sc = r>0.6?'#4fc3f7':r>0.3?'#ffd166':'#ff6b9d';
    ctx.strokeStyle=sc; ctx.lineWidth=2.5; ctx.shadowColor=sc; ctx.shadowBlur=10;
    ctx.globalAlpha=0.55+0.35*r;
    ctx.beginPath(); ctx.arc(x,y,30,-Math.PI*0.85,Math.PI*2*r-Math.PI*0.85); ctx.stroke();
  }
  ctx.restore();
}

const EC = [['#ff6b9d','#c0392b'],['#a29bfe','#6c5ce7'],['#55efc4','#00b894']];

function drawEnemy(e) {
  const [light,dark] = EC[e.type%3];
  ctx.save();
  if (e.hitFlash>0) { ctx.shadowColor='#fff'; ctx.shadowBlur=18*e.hitFlash; }
  const fill = e.hitFlash>0 ? '#ffffff' : dark;
  ctx.fillStyle=fill;
  ctx.beginPath(); ctx.moveTo(e.x,e.y+14); ctx.lineTo(e.x-14,e.y-10); ctx.lineTo(e.x+14,e.y-10); ctx.closePath(); ctx.fill();
  if (!e.hitFlash) {
    ctx.fillStyle=light;
    ctx.beginPath(); ctx.moveTo(e.x,e.y+10); ctx.lineTo(e.x-10,e.y-6); ctx.lineTo(e.x+10,e.y-6); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=light; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(e.x-14,e.y-10); ctx.lineTo(e.x-18,e.y-14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(e.x+14,e.y-10); ctx.lineTo(e.x+18,e.y-14); ctx.stroke();
    if (e.hp < e.maxHp) {
      const bw=28; ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(e.x-bw/2,e.y-18,bw,3);
      ctx.fillStyle=e.hp/e.maxHp>0.5?'#55efc4':'#ff6b9d';
      ctx.fillRect(e.x-bw/2,e.y-18,bw*(e.hp/e.maxHp),3);
    }
  }
  ctx.restore();
}

function drawBoss(b) {
  if (!b) return;
  ctx.save();
  if (b.hitFlash>0) { ctx.shadowColor='#fff'; ctx.shadowBlur=30*b.hitFlash; }
  // Body
  const pulse = 0.85 + 0.15*Math.sin(Date.now()*0.004);
  const bx=b.x, by=b.y;
  ctx.fillStyle = b.hitFlash>0 ? '#ffffff' : '#3d0070';
  ctx.beginPath();
  ctx.moveTo(bx, by-44); ctx.lineTo(bx+36, by+10); ctx.lineTo(bx+20, by+36);
  ctx.lineTo(bx-20, by+36); ctx.lineTo(bx-36, by+10); ctx.closePath();
  ctx.fill();
  if (!b.hitFlash) {
    ctx.fillStyle='#8e00d4';
    ctx.beginPath(); ctx.moveTo(bx,by-36); ctx.lineTo(bx+26,by+8); ctx.lineTo(bx,by+26); ctx.lineTo(bx-26,by+8); ctx.closePath(); ctx.fill();
    // Glow core
    const cg = ctx.createRadialGradient(bx,by,0,bx,by,20*pulse);
    cg.addColorStop(0,'rgba(200,80,255,0.9)'); cg.addColorStop(1,'rgba(100,0,200,0)');
    ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(bx,by,20*pulse,0,Math.PI*2); ctx.fill();
    // Eye
    ctx.fillStyle='#ff00ff'; ctx.shadowColor='#ff00ff'; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.arc(bx,by-8,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(bx,by-10,3,0,Math.PI*2); ctx.fill();
    // Wings
    ctx.strokeStyle='#a855f7'; ctx.lineWidth=2.5; ctx.shadowColor='#a855f7'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.moveTo(bx-36,by+10); ctx.lineTo(bx-56,by-10); ctx.lineTo(bx-44,by+22); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+36,by+10); ctx.lineTo(bx+56,by-10); ctx.lineTo(bx+44,by+22); ctx.stroke();
    // HP bar
    const bpw=120, bph=8;
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(bx-bpw/2, by-58, bpw, bph);
    const hp_r = b.hp/b.maxHp;
    const hcol = hp_r>0.5?'#a855f7':hp_r>0.25?'#ffd166':'#ff6b9d';
    ctx.fillStyle=hcol; ctx.shadowColor=hcol; ctx.shadowBlur=6;
    ctx.fillRect(bx-bpw/2, by-58, bpw*hp_r, bph);
    ctx.shadowBlur=0;
    ctx.fillStyle='#cc88ff'; ctx.font='bold 10px Courier New'; ctx.textAlign='center';
    ctx.fillText('BOSS', bx, by-62);
    ctx.fillStyle='rgba(200,100,255,0.4)'; ctx.font='9px Courier New';
    ctx.fillText(`${Math.ceil(b.hp)} / ${b.maxHp}`, bx, by-50);
  }
  ctx.restore();
}

function drawBullet(b, isEnemy, color) {
  if (b.laser) {
    ctx.save();
    ctx.strokeStyle = color||'#80ffcc';
    ctx.lineWidth = b.w||6;
    ctx.shadowColor = color||'#80ffcc'; ctx.shadowBlur=16;
    ctx.globalAlpha = b.alpha||1;
    ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x, b.y - (b.len||H)); ctx.stroke();
    ctx.restore(); return;
  }
  // Trail
  if (b.trail && b.trail.length>1) {
    for (let i=0; i<b.trail.length-1; i++) {
      const a = (i/b.trail.length)*0.45, w = (i/b.trail.length)*3;
      ctx.save();
      ctx.strokeStyle = isEnemy?`rgba(255,107,157,${a})`:`rgba(255,209,102,${a})`;
      ctx.lineWidth=w; ctx.shadowColor=isEnemy?'#ff6b9d':'#ffd166'; ctx.shadowBlur=4;
      ctx.beginPath(); ctx.moveTo(b.trail[i].x,b.trail[i].y); ctx.lineTo(b.trail[i+1].x,b.trail[i+1].y); ctx.stroke();
      ctx.restore();
    }
  }
  ctx.save();
  const g = ctx.createLinearGradient(b.x,b.y-7,b.x,b.y+7);
  if (isEnemy) { g.addColorStop(0,'#ff6b9d'); g.addColorStop(1,'#c0392b'); ctx.shadowColor='#ff6b9d'; }
  else { g.addColorStop(0,color||'#ffd166'); g.addColorStop(1,color?color:'#ff6b35'); ctx.shadowColor=color||'#ffd166'; }
  ctx.shadowBlur=10; ctx.fillStyle=g;
  ctx.beginPath(); ctx.roundRect(b.x-2,b.y-7,4,14,2); ctx.fill();
  ctx.restore();
}

function drawExplosion(ex) {
  const size=10+ex.frame*9, op=1-ex.frame/8;
  const g=ctx.createRadialGradient(ex.x,ex.y,0,ex.x,ex.y,size);
  g.addColorStop(0,`rgba(255,255,200,${op})`);
  g.addColorStop(0.4,`rgba(255,180,50,${op})`);
  g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(ex.x,ex.y,size,0,Math.PI*2); ctx.fill();
  if (ex.sparks) ex.sparks.forEach(sp=>{
    ctx.save(); ctx.globalAlpha=op*0.7;
    ctx.strokeStyle='#ffd166'; ctx.lineWidth=1.5; ctx.shadowColor='#ffd166'; ctx.shadowBlur=4;
    ctx.beginPath(); ctx.moveTo(ex.x,ex.y); ctx.lineTo(ex.x+sp.dx*ex.frame*3, ex.y+sp.dy*ex.frame*3); ctx.stroke();
    ctx.restore();
  });
}

function drawDrop(d) {
  ctx.save();
  ctx.shadowColor=d.color; ctx.shadowBlur=10;
  ctx.fillStyle=d.color;
  ctx.beginPath(); ctx.arc(d.x,d.y,7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 9px Courier New'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(d.icon,d.x,d.y);
  ctx.textBaseline='alphabetic';
  ctx.restore();
}

function drawSkillBar() {
  const bw=160, bh=6, bx=W/2-bw/2, by=H-26;
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(bx,by,bw,bh);
  const r=skillCharge/skillMax;
  const ready = r>=1;
  const sc = ready?'#ffd166':'#a855f7';
  ctx.fillStyle=sc; ctx.shadowColor=sc; ctx.shadowBlur= ready?12:4;
  ctx.fillRect(bx,by,bw*Math.min(r,1),bh);
  ctx.shadowBlur=0;
  ctx.fillStyle=ready?'#ffd166':'#6a3a9a'; ctx.font='9px Courier New'; ctx.textAlign='center';
  const names=['SPREAD','LASER','BOMB'];
  ctx.fillText('SKILL ['+(ready?'READY! press X':'X: '+names[skillType%3])+']', W/2, by-3);
}

function drawShieldBar() {
  const bw=100, bh=5, bx=12, by=H-22;
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(bx,by,bw,bh);
  const r=shield/maxShield;
  const sc=r>0.6?'#4fc3f7':r>0.3?'#ffd166':'#ff6b9d';
  ctx.fillStyle=sc; ctx.shadowColor=sc; ctx.shadowBlur=5;
  ctx.fillRect(bx,by,bw*r,bh); ctx.shadowBlur=0;
  ctx.fillStyle='#3a5a7a'; ctx.font='9px Courier New'; ctx.textAlign='left';
  ctx.fillText('SHIELD', bx, by-3);
}

function drawStageProgress() {
  if (boss) return;
  const bw=100, bh=5, bx=W-bw-12, by=H-22;
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(bx,by,bw,bh);
  const r=stageKills/stageKillTarget;
  ctx.fillStyle='#55efc4'; ctx.shadowColor='#55efc4'; ctx.shadowBlur=4;
  ctx.fillRect(bx,by,bw*Math.min(r,1),bh); ctx.shadowBlur=0;
  ctx.fillStyle='#3a7a5a'; ctx.font='9px Courier New'; ctx.textAlign='right';
  ctx.fillText(`${stageKills}/${stageKillTarget} → BOSS`, W-12, by-3);
}

function drawFloatText(ft) {
  ctx.save(); ctx.globalAlpha=ft.opacity;
  ctx.font=`bold ${ft.size||14}px Courier New`; ctx.textAlign='center';
  ctx.fillStyle=ft.color||'#ffd166'; ctx.shadowColor=ft.color||'#ffd166'; ctx.shadowBlur=8;
  ctx.fillText(ft.text,ft.x,ft.y); ctx.restore();
}

function drawStars() {
  STARS.forEach(s=>{
    ctx.globalAlpha=s.opacity; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y%H,s.size,0,Math.PI*2); ctx.fill();
  }); ctx.globalAlpha=1;
}

// ══════════════════════════════════════════
//  IDLE SCREEN
// ══════════════════════════════════════════
function drawIdleScreen() {
  ctx.save(); ctx.shadowColor='#a855f7'; ctx.shadowBlur=40;
  ctx.fillStyle='#d8b4fe'; ctx.font='bold 42px Courier New'; ctx.textAlign='center';
  ctx.fillText('COSMOS', W/2, H/2-120); ctx.restore();
  ctx.fillStyle='#6c8ebf'; ctx.font='12px Courier New'; ctx.textAlign='center';
  ctx.fillText('SPACE SHOOTER v3', W/2, H/2-90);
  drawPlayer(W/2, H/2-30);
  ctx.strokeStyle='#a855f7'; ctx.lineWidth=2; ctx.shadowColor='#a855f7'; ctx.shadowBlur=14;
  ctx.strokeRect(W/2-68,H/2+38,136,44); ctx.shadowBlur=0;
  ctx.fillStyle='rgba(168,85,247,0.1)'; ctx.fillRect(W/2-68,H/2+38,136,44);
  ctx.fillStyle='#d8b4fe'; ctx.font='17px Courier New'; ctx.textAlign='center';
  ctx.fillText('START', W/2, H/2+66);
  ctx.fillStyle='#2a3a5a'; ctx.font='9px Courier New';
  ctx.fillText('STAGES · BOSS · SKILLS · HP · SHIELD', W/2, H/2+104);
  ctx.fillText('ARROW/WASD:MOVE  SPACE/Z:FIRE  X:SKILL', W/2, H/2+120);
  ctx.fillText('MOBILE: TOUCH & DRAG', W/2, H/2+136);
}

// ══════════════════════════════════════════
//  STAGE CLEAR SCREEN
// ══════════════════════════════════════════
function drawStageClearScreen() {
  ctx.fillStyle='rgba(2,2,16,0.7)'; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.shadowColor='#55efc4'; ctx.shadowBlur=24;
  ctx.fillStyle='#55efc4'; ctx.font='bold 26px Courier New'; ctx.textAlign='center';
  ctx.fillText('STAGE '+(stage-1)+' CLEAR!', W/2, H/2-30); ctx.restore();
  ctx.fillStyle='#a8d8f0'; ctx.font='13px Courier New'; ctx.textAlign='center';
  ctx.fillText('STAGE '+stage+' STARTING...', W/2, H/2+10);
  ctx.fillStyle='rgba(85,239,196,0.15)';
  const prog = 1 - stageClearTimer/120;
  ctx.fillRect(W/2-80, H/2+30, 160*prog, 6);
}

// ══════════════════════════════════════════
//  GAME OVER SCREEN
// ══════════════════════════════════════════
function drawGameOverScreen() {
  ctx.fillStyle='rgba(2,2,16,0.82)'; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.shadowColor='#ff6b9d'; ctx.shadowBlur=24;
  ctx.fillStyle='#ff6b9d'; ctx.font='bold 30px Courier New'; ctx.textAlign='center';
  ctx.fillText('GAME OVER', W/2, H/2-90); ctx.restore();
  ctx.fillStyle='#a8d8f0'; ctx.font='12px Courier New'; ctx.textAlign='center';
  ctx.fillText('STAGE '+stage, W/2, H/2-58);
  ctx.fillStyle='#ffd166'; ctx.font='bold 34px Courier New';
  ctx.fillText(score, W/2, H/2-24);
  if (score>0 && score>=highScore) { ctx.fillStyle='#ffd166'; ctx.font='12px Courier New'; ctx.fillText('✦ NEW RECORD ✦', W/2, H/2+4); }
  ctx.fillStyle='#6c8ebf'; ctx.font='11px Courier New'; ctx.fillText('BEST: '+highScore, W/2, H/2+24);
  ctx.strokeStyle='#ff6b9d'; ctx.lineWidth=2; ctx.shadowColor='#ff6b9d'; ctx.shadowBlur=10;
  ctx.strokeRect(W/2-58,H/2+42,116,40); ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,107,157,0.1)'; ctx.fillRect(W/2-58,H/2+42,116,40);
  ctx.fillStyle='#ff6b9d'; ctx.font='15px Courier New'; ctx.textAlign='center';
  ctx.fillText('RETRY', W/2, H/2+68);
}

// ══════════════════════════════════════════
//  SKILL ACTIVATION
// ══════════════════════════════════════════
function activateSkill() {
  if (skillCharge < skillMax) return;
  skillCharge = 0; SFX.skill();
  const t = skillType % 3;
  if (t === 0) { // SPREAD: 5-way
    for (let a=-40; a<=40; a+=20) {
      const rad = (a-90)*Math.PI/180;
      bullets.push({x:player.x, y:player.y-22, vx:Math.cos(rad)*9, vy:Math.sin(rad)*9, trail:[], spread:true});
    }
    floatTexts.push({x:player.x,y:player.y-40,text:'SPREAD!',color:'#80ffcc',size:16,opacity:1,vy:-1.5});
  } else if (t === 1) { // LASER
    bullets.push({x:player.x, y:player.y, laser:true, alpha:1, len:H, w:8, timer:40});
    floatTexts.push({x:player.x,y:player.y-40,text:'LASER!',color:'#ffd166',size:16,opacity:1,vy:-1.5});
    skillActive=true; skillTimer=40;
  } else { // BOMB: clear all enemies
    enemies.forEach(e=>{
      const pts=20*Math.max(1,combo)*Math.ceil(stage/2);
      score+=pts; stageKills++;
      explosions.push({x:e.x,y:e.y,frame:0,sparks:Array.from({length:6},()=>({dx:(Math.random()-0.5)*2,dy:(Math.random()-0.5)*2}))});
    });
    if (boss) {
      const dmg=boss.maxHp*0.3;
      boss.hp-=dmg; boss.hitFlash=1;
      if(boss.hp<=0){killBoss();}
    }
    enemies=[];
    screenShake=Math.min(screenShake+3,4);
    floatTexts.push({x:W/2,y:H/2,text:'BOMB!!',color:'#ff6b9d',size:24,opacity:1,vy:-0.8});
    SFX.bossRoar();
  }
}

// ══════════════════════════════════════════
//  BOSS
// ══════════════════════════════════════════
function spawnBoss() {
  const hp = 60 + stage*30;
  boss = {
    x: W/2, y: -60, targetY: 90,
    hp, maxHp: hp, hitFlash:0,
    phase:1, moveT:0, fireT:0, pattern:0,
    vx:1.2, entered:false
  };
  SFX.bossRoar();
  floatTexts.push({x:W/2,y:H/2-60,text:'⚠ BOSS ⚠',color:'#ff00ff',size:22,opacity:1,vy:-0.5});
}

function killBoss() {
  const pts=500*stage;
  score+=pts;
  floatTexts.push({x:boss.x,y:boss.y,text:'BOSS DOWN! +'+pts,color:'#ffd166',size:18,opacity:1,vy:-1.2});
  for(let i=0;i<12;i++) explosions.push({x:boss.x+(Math.random()-0.5)*60,y:boss.y+(Math.random()-0.5)*40,frame:0,sparks:Array.from({length:8},()=>({dx:(Math.random()-0.5)*3,dy:(Math.random()-0.5)*3}))});
  screenShake=Math.min(screenShake+4,5);
  boss=null;
  // Stage clear
  state='stageClear'; stageClearTimer=120;
  SFX.stageUp();
}

function updateBoss(now) {
  if (!boss) return;
  // Enter
  if (!boss.entered) {
    boss.y += 1.5;
    if (boss.y >= boss.targetY) boss.entered=true;
    return;
  }
  // Movement
  boss.moveT++;
  boss.x += boss.vx * (1 + boss.phase*0.3);
  if (boss.x > W-50 || boss.x < 50) boss.vx *= -1;
  // Phase 2 at 50% HP
  if (boss.hp < boss.maxHp*0.5 && boss.phase===1) {
    boss.phase=2;
    floatTexts.push({x:boss.x,y:boss.y,text:'PHASE 2!',color:'#ff00ff',size:18,opacity:1,vy:-1});
    SFX.bossRoar();
  }
  // Fire patterns
  boss.fireT++;
  const fireRate = boss.phase===2 ? 40 : 60;
  if (boss.fireT >= fireRate) {
    boss.fireT=0; boss.pattern=(boss.pattern+1)%3;
    const bx=boss.x, by=boss.y+30;
    if (boss.pattern===0) {
      // 3-way spread
      [-20,0,20].forEach(a=>{
        const rad=(a+90)*Math.PI/180;
        enemyBullets.push({x:bx,y:by,vx:Math.cos(rad)*4,vy:Math.sin(rad)*5,trail:[]});
      });
    } else if (boss.pattern===1) {
      // Aimed at player
      const dx=player.x-bx, dy=player.y-by;
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      const spd=boss.phase===2?6:4.5;
      enemyBullets.push({x:bx,y:by,vx:dx/len*spd,vy:dy/len*spd,trail:[]});
      if (boss.phase===2) {
        enemyBullets.push({x:bx-20,y:by,vx:dx/len*spd,vy:dy/len*spd,trail:[]});
        enemyBullets.push({x:bx+20,y:by,vx:dx/len*spd,vy:dy/len*spd,trail:[]});
      }
    } else {
      // Circle burst (phase 2 only)
      if (boss.phase===2) {
        for(let a=0;a<360;a+=45) {
          const rad=a*Math.PI/180;
          enemyBullets.push({x:bx,y:by,vx:Math.cos(rad)*3,vy:Math.sin(rad)*3,trail:[]});
        }
      } else {
        enemyBullets.push({x:bx,y:by,vx:0,vy:5,trail:[]});
      }
    }
  }
  boss.hitFlash=Math.max(0,boss.hitFlash-0.12);
}

// ══════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════
function gameLoop(now) {
  const dt = Math.min(now-lastTime, 50);
  lastTime = now;

  // BG
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#020210'); bg.addColorStop(0.5,'#0a0a2e'); bg.addColorStop(1,'#0d0d3b');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  STARS.forEach(s=>{s.y+=s.speed*(state==='playing'?1:0.4); if(s.y>H)s.y=-2;});
  drawStars();

  if (state==='idle') { drawIdleScreen(); requestAnimationFrame(gameLoop); return; }
  if (state==='dead') {
    enemies.forEach(drawEnemy); if(boss)drawBoss(boss);
    explosions.forEach(drawExplosion);
    drawGameOverScreen();
    requestAnimationFrame(gameLoop); return;
  }
  if (state==='stageClear') {
    enemies.forEach(drawEnemy);
    explosions=explosions.map(ex=>({...ex,frame:ex.frame+1})).filter(ex=>ex.frame<8);
    explosions.forEach(drawExplosion);
    floatTexts=floatTexts.map(ft=>({...ft,y:ft.y+ft.vy,opacity:ft.opacity-0.012})).filter(ft=>ft.opacity>0);
    floatTexts.forEach(drawFloatText);
    drawStageClearScreen();
    stageClearTimer--;
    if (stageClearTimer<=0) {
      stage++;
      stageKills=0; stageKillTarget=getKillTarget(stage);
      boss=null; enemies=[]; enemyBullets=[];
      // Reward
      hp=Math.min(maxHp,hp+1);
      if(stage%2===0){maxShield=Math.min(5,maxShield+1);}
      shield=maxShield;
      skillType=stage%3;
      floatTexts.push({x:W/2,y:H/2-20,text:'HP +1  SHIELD FULL',color:'#55efc4',size:14,opacity:1,vy:-0.8});
      state='playing';
    }
    requestAnimationFrame(gameLoop); return;
  }

  // ── PLAYING ──
  gameTime += dt/1000;

  // Screen shake
  if (screenShake>0) {
    ctx.save();
    ctx.translate((Math.random()-0.5)*screenShake*5, (Math.random()-0.5)*screenShake*5);
    screenShake=Math.max(0,screenShake-0.18);
  }

  // Player move
  const pspd = skillActive?7:5;
  if (keys['ArrowLeft']||keys['KeyA']) player.x=Math.max(18,player.x-pspd);
  if (keys['ArrowRight']||keys['KeyD']) player.x=Math.min(W-18,player.x+pspd);
  if (keys['ArrowUp']||keys['KeyW']) player.y=Math.max(22,player.y-pspd);
  if (keys['ArrowDown']||keys['KeyS']) player.y=Math.min(H-30,player.y+pspd);

  // Skill timer
  if (skillActive) {
    skillTimer--;
    if (skillTimer<=0) { skillActive=false; }
  }
  // Skill key
  if (keys['KeyX'] && skillCharge>=skillMax) { activateSkill(); keys['KeyX']=false; }

  // Fire
  const fireCooldown = skillActive?80:Math.max(130,200-stage*8);
  if ((keys['Space']||keys['KeyZ']) && now-lastFire>fireCooldown) {
    if (skillActive && skillType%3===0) {
      // spread always on during skill active
      for(let a=-20;a<=20;a+=10) {
        const rad=(a-90)*Math.PI/180;
        bullets.push({x:player.x,y:player.y-22,vx:Math.cos(rad)*9,vy:Math.sin(rad)*9,trail:[],spread:true});
      }
    } else {
      bullets.push({x:player.x,y:player.y-22,trail:[]});
    }
    lastFire=now; SFX.shoot();
  }

  // Move bullets
  bullets = bullets.map(b=>{
    if (b.laser) {
      b.timer--; b.alpha=b.timer/40;
      return b.timer>0?b:null;
    }
    const trail=[...(b.trail||[]),{x:b.x,y:b.y}].slice(-8);
    const nx=b.vx?b.x+b.vx:b.x;
    const ny=b.vy?b.y+b.vy:b.y-9;
    return {...b,x:nx,y:ny,trail};
  }).filter(b=>b&&b.y>-20&&b.x>-10&&b.x<W+10);

  // Spawn enemies (only if no boss)
  if (!boss && state==='playing') {
    const interval=Math.max(350, 1200-stage*100-(gameTime*2));
    if (now-lastEnemySpawn>interval) {
      const isElite=stage>=2&&Math.random()<0.25+stage*0.05;
      const hp=isElite?2+stage:1;
      enemies.push({x:24+Math.random()*(W-48),y:-20,type:Math.floor(Math.random()*3),hp,maxHp:hp,hitFlash:0,elite:isElite});
      lastEnemySpawn=now;
    }
    // Boss trigger
    if (stageKills>=stageKillTarget&&!boss) { spawnBoss(); }
  }

  // Move enemies
  const espd=(1.3+stage*0.25)*(1+score*0.0003);
  enemies=enemies.map(e=>({...e,y:e.y+espd*(e.elite?0.7:1),hitFlash:Math.max(0,(e.hitFlash||0)-0.12)})).filter(e=>e.y<H+30);

  // Enemy fire
  if (!boss && now-lastEnemyFire>Math.max(700,1600-stage*100) && enemies.length>0) {
    const shooter=enemies[Math.floor(Math.random()*enemies.length)];
    enemyBullets.push({x:shooter.x,y:shooter.y+16,trail:[]});
    lastEnemyFire=now;
  }

  // Move enemy bullets
  enemyBullets=enemyBullets.map(b=>{
    const trail=[...(b.trail||[]),{x:b.x,y:b.y}].slice(-6);
    const nx=b.vx?b.x+b.vx:b.x;
    const ny=b.vy?b.y+b.vy:b.y+5+stage*0.2;
    return {...b,x:nx,y:ny,trail};
  }).filter(b=>b.y<H+10&&b.x>-10&&b.x<W+10);

  // Combo timeout
  if (combo>0&&now-lastKillTime>1500){combo=0;updateHUD();}

  // Shield regen
  shieldRegen+=dt/1000;
  if (shieldRegen>6&&shield<maxShield) shield=Math.min(maxShield,shield+0.004*dt);

  // ── COLLISIONS ──
  let newExplosions=[];

  // Bullets vs enemies
  bullets=bullets.filter(b=>{
    if (b.laser) {
      enemies=enemies.map(e=>{
        if (Math.abs(b.x-e.x)<20 && e.y>player.y-H && e.y<player.y) {
          e={...e,hp:e.hp-0.15,hitFlash:0.5};
          if(e.hp<=0){
            combo++;lastKillTime=now;
            const pts=20*Math.max(1,combo)*stage;score+=pts;stageKills++;
            newExplosions.push({x:e.x,y:e.y,frame:0,sparks:Array.from({length:5},()=>({dx:(Math.random()-0.5)*2,dy:(Math.random()-0.5)*2}))});
            floatTexts.push({x:e.x,y:e.y-10,text:combo>=2?`${combo}x +${pts}`:`+${pts}`,color:combo>=5?'#ffd166':combo>=2?'#ff6b9d':'#a8d8f0',size:combo>=2?14:11,opacity:1,vy:-1.2});
            skillCharge=Math.min(skillMax,skillCharge+8);
            return null;
          }
          return e;
        }
        return e;
      }).filter(Boolean);
      // Laser vs boss
      if (boss&&boss.entered&&Math.abs(b.x-boss.x)<36) {
        boss.hp-=0.6;boss.hitFlash=0.6;
        if(boss.hp<=0)killBoss();
        SFX.bossHit();
      }
      return true;
    }
    let hit=false;
    enemies=enemies.map(e=>{
      if(!hit&&Math.abs(b.x-e.x)<20&&Math.abs(b.y-e.y)<20){
        hit=true; e={...e,hp:e.hp-1,hitFlash:1};
        if(e.hp<=0){
          combo++;lastKillTime=now;
          const pts=10*Math.max(1,combo)*stage;score+=pts;stageKills++;
          newExplosions.push({x:e.x,y:e.y,frame:0,sparks:Array.from({length:5},()=>({dx:(Math.random()-0.5)*2,dy:(Math.random()-0.5)*2}))});
          floatTexts.push({x:e.x,y:e.y-10,text:combo>=2?`${combo}x +${pts}`:`+${pts}`,color:combo>=5?'#ffd166':combo>=2?'#ff6b9d':'#a8d8f0',size:combo>=2?14:11,opacity:1,vy:-1.2});
          if(combo>=3)SFX.combo(); else SFX.hit();
          skillCharge=Math.min(skillMax,skillCharge+6);
          screenShake=Math.min(screenShake+0.25,1.5);
          // Drop chance
          if(Math.random()<0.12){
            const types=[{color:'#55efc4',icon:'H',type:'hp'},{color:'#4fc3f7',icon:'S',type:'shield'},{color:'#ffd166',icon:'X',type:'skill'}];
            const d=types[Math.floor(Math.random()*types.length)];
            drops.push({x:e.x,y:e.y,...d,vy:1.5});
          }
          return null;
        }
        return e;
      }
      return e;
    }).filter(Boolean);
    // Hit boss
    if(!hit&&boss&&boss.entered&&Math.abs(b.x-boss.x)<36&&Math.abs(b.y-boss.y)<46){
      hit=true; boss.hp-=1;boss.hitFlash=1;
      if(boss.hp<=0)killBoss(); else SFX.bossHit();
      skillCharge=Math.min(skillMax,skillCharge+3);
    }
    return !hit;
  });

  // Enemy bullets vs player
  enemyBullets=enemyBullets.filter(b=>{
    if(Math.abs(b.x-player.x)<18&&Math.abs(b.y-player.y)<22){
      if(shield>=1){
        shield-=1;shieldRegen=0;
        newExplosions.push({x:b.x,y:b.y,frame:0,sparks:[]});
        floatTexts.push({x:player.x,y:player.y-30,text:'SHIELD!',color:'#4fc3f7',size:12,opacity:1,vy:-1});
        SFX.shield(); screenShake=Math.min(screenShake+0.6,2);
      } else {
        hp--;shieldRegen=0;
        newExplosions.push({x:player.x,y:player.y,frame:0,sparks:Array.from({length:8},()=>({dx:(Math.random()-0.5)*2,dy:(Math.random()-0.5)*2}))});
        SFX.damage(); screenShake=Math.min(screenShake+1.5,3); combo=0;
        floatTexts.push({x:player.x,y:player.y-30,text:`HP ${hp}/${maxHp}`,color:'#ff6b9d',size:13,opacity:1,vy:-1.2});
        if(hp<=0){endGame();return false;}
      }
      return false;
    }
    return true;
  });

  // Enemies vs player
  enemies=enemies.filter(e=>{
    if(Math.abs(e.x-player.x)<26&&Math.abs(e.y-player.y)<26){
      newExplosions.push({x:e.x,y:e.y,frame:0,sparks:Array.from({length:5},()=>({dx:(Math.random()-0.5)*2,dy:(Math.random()-0.5)*2}))});
      if(shield>=1){
        shield-=1;shieldRegen=0;SFX.shield();screenShake=Math.min(screenShake+1,2);
        floatTexts.push({x:player.x,y:player.y-30,text:'SHIELD!',color:'#4fc3f7',size:12,opacity:1,vy:-1});
      } else {
        hp--;SFX.damage();screenShake=Math.min(screenShake+1.5,3);combo=0;
        floatTexts.push({x:player.x,y:player.y-30,text:`HP ${hp}/${maxHp}`,color:'#ff6b9d',size:13,opacity:1,vy:-1.2});
        if(hp<=0){endGame();return false;}
      }
      return false;
    }
    return true;
  });

  // Drops
  drops=drops.map(d=>({...d,y:d.y+d.vy})).filter(d=>d.y<H+20);
  drops=drops.filter(d=>{
    if(Math.abs(d.x-player.x)<20&&Math.abs(d.y-player.y)<20){
      if(d.type==='hp'){hp=Math.min(maxHp,hp+1);floatTexts.push({x:d.x,y:d.y-10,text:'HP +1',color:'#55efc4',size:13,opacity:1,vy:-1.2});}
      else if(d.type==='shield'){shield=Math.min(maxShield,shield+1);floatTexts.push({x:d.x,y:d.y-10,text:'SHIELD +1',color:'#4fc3f7',size:13,opacity:1,vy:-1.2});}
      else if(d.type==='skill'){skillCharge=Math.min(skillMax,skillCharge+30);floatTexts.push({x:d.x,y:d.y-10,text:'SKILL +30%',color:'#ffd166',size:13,opacity:1,vy:-1.2});}
      SFX.pickup(); return false;
    }
    return true;
  });

  // Update boss
  updateBoss(now);

  // Update explosions / floats
  explosions=[...explosions.map(ex=>({...ex,frame:ex.frame+1})).filter(ex=>ex.frame<8),...newExplosions];
  floatTexts=floatTexts.map(ft=>({...ft,y:ft.y+ft.vy,opacity:ft.opacity-0.018})).filter(ft=>ft.opacity>0);

  // ── DRAW ──
  explosions.forEach(drawExplosion);
  drops.forEach(drawDrop);
  enemies.forEach(drawEnemy);
  drawBoss(boss);
  bullets.forEach(b=>drawBullet(b,false));
  enemyBullets.forEach(b=>drawBullet(b,true));
  drawPlayer(player.x,player.y);
  floatTexts.forEach(drawFloatText);
  drawShieldBar();
  drawSkillBar();
  drawStageProgress();
  drawDiffInfo();

  if (screenShake>0) ctx.restore();
  updateHUD();
  requestAnimationFrame(gameLoop);
}

function drawDiffInfo() {
  ctx.save();
  ctx.fillStyle='rgba(255,209,102,0.25)'; ctx.font='9px Courier New'; ctx.textAlign='right';
  ctx.fillText(`STG${stage} / T:${Math.floor(gameTime)}s`, W-8, 14);
  ctx.restore();
}

function endGame() {
  highScore=Math.max(highScore,score);
  state='dead'; SFX.gameover(); updateHUD();
}

function startGame() {
  resumeAudio(); initGame(); state='playing'; lastTime=performance.now();
}

// ══════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════
function handleClick(cx,cy) {
  if(state==='idle'&&cx>W/2-68&&cx<W/2+68&&cy>H/2+38&&cy<H/2+82) startGame();
  else if(state==='dead'&&cx>W/2-58&&cx<W/2+58&&cy>H/2+42&&cy<H/2+82) startGame();
}
canvas.addEventListener('click', e=>{
  const r=canvas.getBoundingClientRect();
  handleClick((e.clientX-r.left)*(W/r.width),(e.clientY-r.top)*(H/r.height));
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); resumeAudio();
  const r=canvas.getBoundingClientRect();
  const tx=(e.touches[0].clientX-r.left)*(W/r.width), ty=(e.touches[0].clientY-r.top)*(H/r.height);
  if(state!=='playing'){handleClick(tx,ty);return;}
  isTouching=true; keys['Space']=true;
  player.x=Math.max(18,Math.min(W-18,tx));
  player.y=Math.max(22,Math.min(H-30,ty));
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!isTouching||state!=='playing')return;
  const r=canvas.getBoundingClientRect();
  player.x=Math.max(18,Math.min(W-18,(e.touches[0].clientX-r.left)*(W/r.width)));
  player.y=Math.max(22,Math.min(H-30,(e.touches[0].clientY-r.top)*(H/r.height)));
},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();isTouching=false;keys['Space']=false;},{passive:false});
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code))e.preventDefault();
  if((e.code==='Enter'||e.code==='Space')&&(state==='idle'||state==='dead'))startGame();
  if(e.code==='KeyX'&&state==='playing')activateSkill();
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
